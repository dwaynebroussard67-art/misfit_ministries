services:
  - type: web
    name: misfit-api
    runtime: node
    plan: standard
    buildCommand: pnpm install && pnpm --filter @workspace/db build && pnpm --filter @workspace/api-server build && pnpm --filter @workspace/misfit build
    startCommand: node /opt/render/project/artifacts/api-server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PRINTIFY_JWT_TOKEN
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: FORGE_PASSPHRASE
        sync: false
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_APP_ID
        value: misfit-ministries
      - key: VITE_APP_TITLE
        value: Misfit Ministries
      - key: VITE_APP_LOGO
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: VITE_ANALYTICS_ENDPOINT
        sync: false
      - key: VITE_ANALYTICS_WEBSITE_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  - type: mysql
    name: misfit-db
    plan: standard
    ipAllowList: []
