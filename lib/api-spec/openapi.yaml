openapi: 3.0.0\ninfo:\n  title: Misfit Ministries API\n  description: |\n    REST API for Misfit Ministries platform\n    - Prayer submissions with crisis detection\n    - Nura AI chat integration\n    - Narcan First Responder network\n    - Store and merchandise management\n    - Admin moderation and analytics\n  version: 1.0.0\n  contact:\n    name: Misfit Ministries\n    url: https://misfitministries.com\n\nservers:\n  - url: https://api.misfitministries.com\n    description: Production API\n  - url: http://localhost:3000/api\n    description: Local development\n\npaths:\n  /prayers:\n    post:\n      summary: Submit a prayer\n      tags:\n        - Prayers\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              properties:\n                text:\n                  type: string\n                  description: Prayer text\n                userName:\n                  type: string\n                  description: Submitter name (optional)\n                latitude:\n                  type: number\n                  description: Geographic latitude\n                longitude:\n                  type: number\n                  description: Geographic longitude\n              required:\n                - text\n      responses:\n        '201':\n          description: Prayer submitted successfully\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  id:\n                    type: integer\n                  crisisFlag:\n                    type: boolean\n                  message:\n                    type: string\n\n  /nura/chat:\n    post:\n      summary: Chat with Nura AI\n      tags:\n        - Nura AI\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              properties:\n                message:\n                  type: string\n                conversationId:\n                  type: string\n              required:\n                - message\n      responses:\n        '200':\n          description: AI response\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  response:\n                    type: string\n                  audioUrl:\n                    type: string\n                  crisisDetected:\n                    type: boolean\n\n  /narcan/help-now:\n    post:\n      summary: Send OD emergency alert\n      tags:\n        - Narcan First Responders\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              properties:\n                latitude:\n                  type: number\n                longitude:\n                  type: number\n              required:\n                - latitude\n                - longitude\n      responses:\n        '200':\n          description: Alert sent to nearby responders\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  alertId:\n                    type: string\n                  respondersNotified:\n                    type: integer\n\n  /store/products:\n    get:\n      summary: Get merchandise products\n      tags:\n        - Store\n      parameters:\n        - name: limit\n          in: query\n          schema:\n            type: integer\n            default: 20\n        - name: offset\n          in: query\n          schema:\n            type: integer\n            default: 0\n      responses:\n        '200':\n          description: List of products\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  type: object\n                  properties:\n                    id:\n                      type: string\n                    name:\n                      type: string\n                    price:\n                      type: integer\n                    image:\n                      type: string\n\n  /video-testimonials:\n    get:\n      summary: Get published video testimonials\n      tags:\n        - Testimonials\n      responses:\n        '200':\n          description: List of testimonials\n    post:\n      summary: Submit video testimonial\n      tags:\n        - Testimonials\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              properties:\n                uploadToken:\n                  type: string\n                title:\n                  type: string\n                description:\n                  type: string\n                videoUrl:\n                  type: string\n                isAnonymous:\n                  type: boolean\n              required:\n                - uploadToken\n                - title\n                - videoUrl\n      responses:\n        '201':\n          description: Testimonial submitted for moderation\n\n  /analytics:\n    get:\n      summary: Get platform analytics (ADMIN)\n      tags:\n        - Analytics\n      parameters:\n        - name: range\n          in: query\n          schema:\n            type: string\n            enum: [24h, 7d, 30d]\n            default: 24h\n      responses:\n        '200':\n          description: Analytics data\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  totalPrayers:\n                    type: integer\n                  crisisPrayers:\n                    type: integer\n                  totalResponders:\n                    type: integer\n                  totalRevenue:\n                    type: integer\n\n  /audit-logs:\n    get:\n      summary: Get audit logs (ADMIN)\n      tags:\n        - Admin\n      responses:\n        '200':\n          description: Audit log entries\n\ncomponents:\n  securitySchemes:\n    bearerAuth:\n      type: http\n      scheme: bearer\n    cookieAuth:\n      type: apiKey\n      in: cookie\n      name: forge_auth\n\nsecurity:\n  - bearerAuth: []\n  - cookieAuth: []\n\ntags:\n  - name: Prayers\n    description: Prayer submission and management\n  - name: Nura AI\n    description: AI chatbot integration\n  - name: Narcan First Responders\n    description: Emergency response network\n  - name: Store\n    description: Merchandise and products\n  - name: Testimonials\n    description: Video testimonials\n  - name: Analytics\n    description: Platform metrics and insights\n  - name: Admin\n    description: Admin-only operations\n
